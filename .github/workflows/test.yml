name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go mod download

      - run: go test ./... -race -coverprofile=coverage.out

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
